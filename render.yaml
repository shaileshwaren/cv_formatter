services:
  - type: web
    name: oxydata-cv-formatter
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: AIRTABLE_BASE_ID
        sync: false
      - key: AIRTABLE_TABLE_ID
        sync: false
      - key: AIRTABLE_PAT
        sync: false
      - key: APP_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"
